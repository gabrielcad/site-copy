<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DONTCRYL2 - Ranking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, 'Segoe UI', sans-serif;
            background: #090d16;
            color: #e8eef8;
            line-height: 1.5;
            min-height: 100vh;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(52, 106, 255, 0.18), transparent 24%),
                        radial-gradient(circle at top right, rgba(0, 255, 205, 0.12), transparent 20%),
                        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.06), transparent 22%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            padding: 10px 0 24px;
        }

        .page-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: #7c95b8;
            font-size: 0.85rem;
            margin-bottom: 14px;
        }

        .page-label::before {
            content: '';
            width: 34px;
            height: 1px;
            background: linear-gradient(90deg, #00a8ff, #7b79ff);
        }

        header h1 {
            font-size: clamp(2.75rem, 4vw, 4.5rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
            margin-bottom: 16px;
        }

        header p {
            max-width: 700px;
            margin: 0 auto;
            color: #a8b8d6;
            font-size: 1rem;
        }

        .top-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 280px;
            background: rgba(14, 21, 45, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px 16px;
            backdrop-filter: blur(12px);
        }

        .search-box input {
            width: 100%;
            border: none;
            background: transparent;
            color: #eef2ff;
            font-size: 1rem;
            outline: none;
        }

        .search-box input::placeholder {
            color: #7b8bbd;
        }

        .btn-primary {
            border: 1px solid rgba(0, 154, 255, 0.35);
            background: rgba(0, 154, 255, 0.12);
            color: #d8ecff;
            padding: 12px 24px;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            white-space: nowrap;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            background: rgba(0, 154, 255, 0.22);
        }

        .info {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            flex-wrap: wrap;
            color: #7b8bbd;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        .info strong {
            color: #d8ecff;
        }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 22px;
        }

        .class-card {
            background: rgba(13, 20, 38, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.18);
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        .class-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 154, 255, 0.35);
        }

        .class-header {
            padding: 22px 24px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .class-id {
            text-transform: uppercase;
            color: #6c83ab;
            font-size: 0.78rem;
            letter-spacing: 0.16em;
            margin-bottom: 8px;
        }

        .class-name {
            font-size: 1.45rem;
            color: #f5f9ff;
            letter-spacing: 0.04em;
        }

        .leader-section {
            padding: 18px 24px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leader-label {
            color: #94a5c4;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-bottom: 6px;
        }

        .leader-name {
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .leader-points {
            align-self: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #58c9ff;
            text-align: right;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.24em;
            color: #90a5c7;
            padding: 16px 18px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        td {
            padding: 14px 18px;
            color: #c8d2ea;
            font-size: 0.95rem;
            text-align: center;
        }

        td:first-child {
            font-weight: 700;
            color: #fff;
        }

        .player-name {
            color: #e9f2ff;
            text-align: left;
        }

        .class-footer {
            padding: 14px 22px 20px;
            color: #7b8bbd;
            font-size: 0.85rem;
        }

        .last-update {
            display: block;
            margin-top: 2px;
        }

        @media (max-width: 900px) {
            .top-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-primary {
                width: 100%;
            }
        }

        @media (max-width: 680px) {
            body {
                padding: 16px;
            }

            .class-card {
                border-radius: 20px;
            }

            .leader-section {
                grid-template-columns: 1fr;
                text-align: left;
            }

            td, thead th {
                padding: 12px 14px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(92, 176, 255, 0.35);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(92, 176, 255, 0.55);
        }
    </style>
</head>
<body>

        function formatDateTime(date) {
            return date.toLocaleString('pt-BR');
        }

        function getRankClass(rank) {
            if (rank === 1) return 'rank rank-1';
            if (rank === 2) return 'rank rank-2';
            if (rank === 3) return 'rank rank-3';
            return 'rank';
        }

        function createClassCard(classData) {
            const leader = classData.players[0];
            const now = new Date();
            
            const playersHtml = classData.players.map(p => `
                <tr>
                    <td class="${getRankClass(p.rank)}">${p.rank}</td>
                    <td class="player-name">${p.name}</td>
                    <td>${p.points}</td>
                    <td>${p.kd}</td>
                    <td>${p.matches}</td>
                    <td>${p.winrate}</td>
                </tr>
            `).join('');

            return `
                <div class="class-card">
                    <div class="class-header">
                        <div class="class-id">CLASSE #${classData.id}</div>
                        <div class="class-name">${classData.name}</div>
                    </div>
                    <div class="leader-section">
                        <div class="leader-info">
                            <div class="leader-label">🏆 Líder</div>
                            <div class="leader-name">${leader.name}</div>
                        </div>
                        <div class="leader-points">${leader.points} pts</div>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Jogador</th>
                                <th>Pts</th>
                                <th>V/D</th>
                                <th>Jogos</th>
                                <th>WR</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${playersHtml}
                        </tbody>
                    </table>
                    <div class="class-footer"></div>
                </div>
            `;
        }

        function renderClasses(classes = classesData) {
            const grid = document.getElementById('classesGrid');
            grid.innerHTML = classes.map(c => createClassCard(c)).join('');
        }

        function updateRanking() {
            // Simula atualização dos dados
            alert('Ranking atualizado!');
            renderClasses();
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            if (!searchTerm) {
                renderClasses();
                return;
            }

            const filtered = classesData.filter(classData => {
                const classMatch = classData.name.toLowerCase().includes(searchTerm);
                const playerMatch = classData.players.some(p => 
                    p.name.toLowerCase().includes(searchTerm)
                );
                return classMatch || playerMatch;
            });

            if (filtered.length > 0) {
                const grid = document.getElementById('classesGrid');
                grid.innerHTML = filtered.map(c => createClassCard(c)).join('');
            }
        });

        // Inicializa a página
        renderClasses();
    </script>

</html>
